<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Georgian Paragliding Federation</title>


<style>

body {

    background:#0f1115;
    color:white;
    font-family:Arial,sans-serif;
    padding:30px;

}



header {

    background:#111;
    padding:10px 0;
    margin-bottom:20px;

}



.container {

    display:flex;
    justify-content:space-between;
    align-items:center;

}



.logo {

    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:white;

}



.logo img {

    width:40px;
    height:40px;
    border-radius:50%;

}



.menu {

    display:flex;
    gap:15px;

}



.menu a {

    color:white;
    text-decoration:none;

}


.menu a:hover {

    color:#00c2ff;

}



.menu-toggle {

    display:none;
    font-size:28px;
    cursor:pointer;

}



@media(max-width:768px){


.menu {

display:none;
flex-direction:column;
background:#111;
position:absolute;
top:70px;
left:0;
width:100%;
padding:15px;

}



.menu.active {

display:flex;

}



.menu-toggle {

display:block;

}

}





h1 {

text-align:center;
color:#00c2ff;

}



.cards {


display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:30px;


}




.card {

background:#161a22;
padding:20px;
border-radius:12px;
text-align:center;


}



.card p {

font-size:26px;
color:#00c2ff;
font-weight:bold;


}




table {


width:100%;
border-collapse:collapse;
background:#161a22;


}



th {

background:#00c2ff;
color:black;
padding:12px;

}



td {

padding:12px;
text-align:center;
border-bottom:1px solid #2a2f3a;

}



</style>

</head>


<body>




<header>


<div class="container">



<a href="index.html" class="logo">


<img src="logo.jpg">


<span>
Georgian Paragliding Federation
</span>


</a>





<div class="menu-toggle" onclick="toggleMenu()">

</div>





<nav class="menu" id="menu">


<a href="index.html">Home</a>

<a href="about.html">About Us</a>

<a href="gallery.html">Gallery</a>

<a href="document.html">Documents</a>

<a href="contact.html">Contact</a>

<a href="BookYourFlight.html">Book Your Flight</a>

<a href="news.html">News</a>

<a href="dashboard.html">Dashboard</a>


</nav>



</div>


</header>

<script>


function toggleMenu(){

document
.getElementById("menu")
.classList.toggle("active");

}


</script>




</body>

</html>
