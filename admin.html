<!DOCTYPE html>
<html lang="en">


<head>


<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Dashboard | Georgian Paragliding Federation
</title>


<link rel="stylesheet" href="style.css">



<style>


/* ================= DASHBOARD ================= */



.dashboard-section{


padding:50px 20px;


}




.dashboard-title{


text-align:center;


margin-bottom:40px;


}



.dashboard-title h1{


font-size:42px;


color:#00c2ff;


}




.dashboard-title p{


color:#ddd;


margin-top:10px;


}





/* CARDS */



.cards{


max-width:1100px;


margin:auto;


display:grid;


grid-template-columns:repeat(4,1fr);


gap:20px;


}






.card{


background:


linear-gradient(

145deg,

rgba(0,194,255,.18),

rgba(255,255,255,.06)

);



border:

1px solid rgba(255,255,255,.2);


border-radius:22px;


padding:30px;


text-align:center;


backdrop-filter:blur(12px);


transition:.3s;



}




.card:hover{


transform:translateY(-8px);


border-color:#00c2ff;


box-shadow:

0 15px 40px rgba(0,194,255,.25);


}




.card h3{


color:#ddd;


margin-bottom:15px;


}



.card p{


font-size:35px;


font-weight:bold;


color:#00c2ff;


}






/* TABLE */



.table-box{


max-width:1200px;


margin:40px auto;


background:


rgba(255,255,255,.07);


border:

1px solid rgba(255,255,255,.15);


border-radius:20px;


padding:25px;


overflow-x:auto;


backdrop-filter:blur(12px);


}





table{


width:100%;


border-collapse:collapse;


}




th{


background:#00c2ff;


color:black;


padding:15px;


}



td{


padding:15px;


text-align:center;


border-bottom:


1px solid rgba(255,255,255,.15);


color:#ddd;


}




tr:hover{


background:

rgba(0,194,255,.08);


}





.status{


padding:6px 15px;


border-radius:20px;


background:

rgba(0,194,255,.2);


color:#00c2ff;


}





@media(max-width:900px){


.cards{


grid-template-columns:1fr 1fr;


}



}



@media(max-width:600px){


.cards{


grid-template-columns:1fr;


}


.dashboard-title h1{


font-size:30px;


}



}




</style>



</head>




<body>




<header>


<div class="container">



<a href="index.html" class="logo">

Georgian Paragliding Federation

</nav>




</div>


</header>









<section class="dashboard-section">





<div class="dashboard-title">


<h1>

📊 Flight Dashboard

</h1>


<p>

Paragliding booking management system

</p>



</div>









<div class="cards">





<div class="card">

<h3>

Total Flights

</h3>


<p>

0

</p>


</div>







<div class="card">

<h3>

<p>

0

</div>








<div class="card">

<p>

0

</div>

</div>

</table>
