<title>Contact | Georgian Paragliding Federation</title>


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}



body{

background:url("para1.jpg") center/cover no-repeat fixed;

color:white;

min-height:100vh;

}



body::before{

content:"";

position:fixed;

inset:0;

background:rgba(0,0,0,.55);

z-index:-1;

}




header{

background:rgba(0,0,0,.85);

padding:10px 0;

position:sticky;

top:0;

z-index:1000;

}




.container{

max-width:1200px;

margin:auto;

padding:0 15px;

display:flex;

align-items:center;

justify-content:space-between;

}



.logo{

display:flex;

align-items:center;

gap:10px;

color:white;

text-decoration:none;

}



.logo img{

width:42px;

height:42px;

border-radius:50%;

}



.menu{

display:flex;

gap:18px;

}



.menu a{

color:white;

text-decoration:none;

}



.menu a:hover{

color:#00c2ff;

}




.contact-box{


max-width:520px;

margin:80px auto;

padding:35px;


background:rgba(255,255,255,.06);


border-radius:18px;


text-align:center;


}




.contact-box h1{


color:#00c2ff;

margin-bottom:30px;

font-size:34px;


}




.contact-item{


padding:18px;

margin-bottom:18px;


border-radius:12px;


background:rgba(255,255,255,.04);


transition:.3s;


}



.contact-item:hover{


background:rgba(0,194,255,.12);

transform:translateY(-3px);


}




.contact-item span{


display:block;

color:#00c2ff;

margin-bottom:8px;

font-weight:bold;


}



.contact-item a{


color:white;

font-size:18px;

text-decoration:none;

}



.contact-item a:hover{


color:#00c2ff;


}





@media(max-width:768px){


.menu{

display:none;

flex-direction:column;

background:black;

position:absolute;

top:60px;

left:0;

width:100%;

padding:20px;

}


.menu.active{

display:flex;

}


.menu-toggle{

display:block;

font-size:28px;

cursor:pointer;

}


}




</style>


</head>
