/* ================= CONTACT BOX ================= */


.contact-box {

    max-width:520px;
    margin:80px auto;
    padding:35px;

    background:rgba(255,255,255,0.06);

    border:1px solid rgba(255,255,255,0.12);

    border-radius:18px;

    backdrop-filter:blur(12px);

    text-align:center;

    box-shadow:0 10px 40px rgba(0,0,0,0.5);

}



.contact-box h1 {

    color:#00c2ff;
    margin-bottom:30px;
    font-size:34px;

}





.contact-item {


    display:flex;

    flex-direction:column;

    align-items:center;


    padding:18px;

    margin-bottom:18px;


    border-radius:12px;


    background:rgba(255,255,255,0.04);


    transition:0.3s;


}





.contact-item:hover {


    background:rgba(0,194,255,0.12);


    transform:translateY(-3px);


}




.contact-item span {


    font-size:13px;

    letter-spacing:1px;

    color:#00c2ff;

    margin-bottom:6px;

    font-weight:bold;


}





.contact-item a {


    font-size:18px;

    color:white;

    text-decoration:none;

    line-height:1.5;


}





.contact-item a:hover {


    color:#00c2ff;


}
