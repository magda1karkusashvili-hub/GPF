<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container" style="min-height:100vh;display:flex;justify-content:center;align-items:center;">


<div class="card" style="max-width:380px;width:100%;padding:40px;text-align:center;">


<div style="font-size:40px">
🔐
</div>


<h2 style="color:#00c2ff">
Admin Login
</h2>


<p style="color:#fbbf24">
Secure Admin Access
</p>



<div class="warning-box">

⚠️ Restricted Area • Authorized Personnel Only

</div>



<form onsubmit="login(event)">


<input id="username"
type="text"
placeholder="Username"
required
style="width:100%;padding:12px;margin:10px 0;background:#111;color:white;border-radius:10px;">



<input id="password"
type="password"
placeholder="Password"
required
style="width:100%;padding:12px;margin:10px 0;background:#111;color:white;border-radius:10px;">



<button class="btn"
style="width:100%;border:none;cursor:pointer;">

Login

</button>


</form>



</div>


</div>



<script>

function login(e){

e.preventDefault();


let user=document.getElementById("username").value;

let pass=document.getElementById("password").value;



if(user==="admin" && pass==="1234"){


localStorage.setItem("admin","true");


window.location="dashboard.html";


}

else{


alert("Incorrect username or password");


}


}



</script>



</body>
</html>
