<!DOCTYPE html>
<html lang="en">


<head>


<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Admin Login | Georgian Paragliding Federation
</title>



<link rel="stylesheet" href="style.css">


</head>



<body>




<div class="container"
style="min-height:100vh;display:flex;justify-content:center;align-items:center;">





<div class="card"
style="max-width:380px;width:100%;text-align:center;padding:40px;">






<div style="font-size:40px;">
🔐
</div>





<h2 style="color:#00c2ff;margin:15px;">
Admin Login
</h2>





<p style="color:#fbbf24;margin-bottom:15px;">

Secure Admin Access

</p>







<div class="warning-box">

⚠️ Restricted Area • Authorized Personnel Only

</div>









<form action="dashboard.html">






<input
type="text"
placeholder="Username"
required
style="width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;background:#111;color:white;">







<input
type="password"
placeholder="Password"
required
style="width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;background:#111;color:white;">








<button
class="btn"
type="submit"
style="width:100%;border:none;cursor:pointer;">

Login

</button>







</form>








<p style="color:#aaa;font-size:12px;margin-top:20px;">


⚠️ All login attempts are monitored and logged.

</p>







<p style="color:#666;font-size:11px;">


Paragliding Admin System v3.0


</p>







</div>




</div>










<script src="script.js"></script>


</body>


</html>
