<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Admin Login | Georgian Paragliding Federation
</title>


<link rel="stylesheet" href="style.css">


</head>


<body>


<div class="container"
style="min-height:100vh;justify-content:center;">



<div class="card"
style="max-width:400px;width:100%;padding:40px;text-align:center;">



<div style="font-size:45px;">
🔐
</div>



<h2 style="color:#00c2ff;margin:15px 0;">

Admin Login

</h2>



<p style="color:#fbbf24;">

Secure Admin Access

</p>




<div class="warning-box">

⚠️ Restricted Area • Authorized Personnel Only

</div>






<form id="loginForm">



<input
id="username"
type="text"
placeholder="Username"
required
style="width:100%;padding:12px;margin:10px 0;border-radius:10px;">





<input
id="password"
type="password"
placeholder="Password"
required
style="width:100%;padding:12px;margin:10px 0;border-radius:10px;">






<button
class="btn"
style="width:100%;border:none;cursor:pointer;"
type="submit">

Login

</button>



<p id="error"
style="color:#ff6b6b;margin-top:15px;display:none;">

Wrong username or password

</p>



</form>







<p style="color:#aaa;font-size:12px;margin-top:20px;">

⚠️ All login attempts are monitored

</p>



<p style="color:#666;font-size:11px;">

Paragliding Admin System v3.0

</p>




</div>


</div>







<script src="script.js"></script>


<script>


document
.getElementById("loginForm")
.addEventListener("submit",function(e){



e.preventDefault();



const user =
document.getElementById("username").value;



const pass =
document.getElementById("password").value;





if(
user==="admin" &&
pass==="12345"

){



localStorage.setItem(
"adminLogin",
"true"
);



window.location.href="admin.html";



}

else{


document
.getElementById("error")
.style.display="block";


}



});



</script>




</body>

</html>
