<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Book Your Flight | Georgian Paragliding Federation
</title>


<link rel="stylesheet" href="style.css">


<style>


/* ================= BOOK PAGE ================= */


.booking-section{


    min-height:90vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:60px 20px;


}




.booking-card{


    width:100%;

    max-width:650px;


    background:

    linear-gradient(
    145deg,
    rgba(0,194,255,.15),
    rgba(255,255,255,.06)
    );


    border:

    1px solid rgba(255,255,255,.2);


    border-radius:25px;


    padding:40px;


    backdrop-filter:blur(15px);


    box-shadow:

    0 20px 60px rgba(0,0,0,.5);



}




.booking-card h1{


    text-align:center;

    color:#00c2ff;

    font-size:38px;

    margin-bottom:15px;


}




.booking-card .subtitle{


    text-align:center;

    color:#ddd;

    margin-bottom:30px;

    line-height:1.6;


}




.booking-form{


    display:flex;

    flex-direction:column;

    gap:15px;


}



.booking-form label{


    color:#00c2ff;

    font-weight:bold;

    font-size:14px;


}



.booking-form input,

.booking-form select{


    width:100%;


    padding:14px;


    border-radius:12px;


    border:

    1px solid rgba(255,255,255,.2);


    background:

    rgba(0,0,0,.45);


    color:white;


    outline:none;


}



.booking-form input:focus,

.booking-form select:focus{


    border-color:#00c2ff;


}





.booking-form button{


    margin-top:15px;


    padding:15px;


    border:none;


    border-radius:15px;


    background:

    linear-gradient(
    135deg,
    #00c2ff,
    #006eff
    );


    color:white;


    font-size:16px;


    font-weight:bold;


    cursor:pointer;


    transition:.3s;


}



.booking-form button:hover{


    transform:translateY(-3px);


    box-shadow:

    0 10px 30px rgba(0,194,255,.4);


}




.warning-box{


    margin-top:10px;


    padding:15px;


    border-radius:12px;


    background:

    rgba(255,165,0,.12);


    border-left:

    4px solid orange;


    color:#ffd27a;


}




.flight-icon{


    text-align:center;

    font-size:55px;

    margin-bottom:15px;


}




@media(max-width:600px){


.booking-card{


    padding:25px;


}



.booking-card h1{


    font-size:28px;


}



}



</style>


</head>




<body>




<header>


<div class="container">



<a href="index.html" class="logo">


<img src="logo.jpg">


<span>

Georgian Paragliding Federation

</span>


</a>





<div class="menu-toggle" onclick="toggleMenu()">

☰

</div>






<nav class="menu" id="menu">


<a href="index.html">
Home
</a>


<a href="about.html">
About Us
</a>


<a href="gallery.html">
Gallery
</a>


<a href="document.html">
Documents
</a>


<a href="contact.html">
Contact
</a>


<a href="BookYourFlight.html">
Book Your Flight
</a>


<a href="news.html">
News
</a>


<a href="dashboard.html">
Dashboard
</a>


</nav>



</div>


</header>







<section class="booking-section">



<div class="booking-card">



<div class="flight-icon">

🪂

</div>




<h1>

Book Your Paragliding Adventure

</h1>




<p class="subtitle">


Choose your location and reserve your flight with Georgian Paragliding Federation.


</p>






<form class="booking-form">





<label>

Flight Location

</label>



<select required>


<option>

Select Location

</option>


<option>

Gudauri

</option>


<option>

Ananuri

</option>


<option>

Tbilisi Sea

</option>


<option>

Mestia

</option>



</select>






<label>

Preferred Date

</label>


<input type="date" required>







<label>

Full Name

</label>


<input 
type="text"
placeholder="Your name"
required>







<label>

Email

</label>


<input
type="email"
placeholder="example@email.com"
required>






<label>

Phone

</label>


<input
type="tel"
placeholder="+995..."
required>







<div class="warning-box">


⚠️ Flight operations depend on weather conditions and pilot availability.


</div>






<button>


Confirm Booking


</button>






</form>




</div>



</section>







<script>


function toggleMenu(){


document
.getElementById("menu")
.classList.toggle("active");


}


</script>






</body>

</html>
