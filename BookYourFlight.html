<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Your Flight | Georgian Paragliding Federation</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: url("{{ url_for('static', filename='images/para1.jpg') }}") center/cover no-repeat fixed;
    color: white;
    min-height: 100vh;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* HEADER */
header {
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
}

.logo img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

.menu {
    display: flex;
    gap: 15px;
}

.menu a {
    text-decoration: none;
    color: white;
}

.menu a:hover {
    color: #00c2ff;
}

.menu-toggle {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

@media (max-width: 768px) {

    .menu {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        background: rgba(0,0,0,0.95);
        padding: 15px;
    }

    .menu.active {
        display: flex;
    }

    .menu-toggle {
        display: block;
    }
}

/* BOOKING */
.booking-section {
    max-width: 720px;
    margin: auto;
    padding: 60px 20px;
}

.booking-title h1 {
    text-align: center;
    color: #00c2ff;
    font-size: 36px;
}

.subtext {
    text-align: center;
    color: #b9c2d0;
    margin-bottom: 30px;
}

.booking-form {

    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 30px;
    border-radius: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);
}

.booking-form label {
    color: #00c2ff;
    font-weight: 600;
    font-size: 13px;
}

.booking-form input,
.booking-form select {

    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.4);
    color: white;
}

.booking-form button {

    padding: 13px;
    background: linear-gradient(135deg, #00c2ff, #0095c9);
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

.warning-box {

    padding: 12px;
    background: rgba(255,165,0,0.08);
    border-left: 4px solid orange;
    color: #ffcc66;
}

</style>

</head>

<body>


<header>

<div class="container">

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <nav class="menu" id="menu">

        <a href="/">Home</a>
        <a href="/about">About Us</a>
        <a href="/gallery">Gallery</a>
        <a href="/document">Documents</a>
        <a href="/contact">Contact</a>
        <a href="/BookYourFlight">Book Your Flight</a>
        <a href="/news">News</a>
        <a href="/dashboard">Dashboard</a>

    </nav>

</div>

</header>


<section class="booking-section">


<div class="booking-title">

<h1>Book Your Paragliding Adventure</h1>

</div>


<p class="subtext">

Choose your location and we will contact you shortly.

</p>



<form class="booking-form"
      action="{{ url_for('book') }}"
      method="POST">


    <label>Location</label>

    <select name="location" required>

        <option value="">Select Location</option>

        <option value="gudauri">Gudauri</option>

        <option value="ananuri">Ananuri</option>

    </select>



    <label>Date</label>

    <input type="date" name="date" required min="{{ today }}">



    <label>Full Name</label>

    <input type="text" name="name" required>



    <label>Email</label>

    <input type="email" name="email" required>



    <label>Phone</label>

    <input type="tel" name="phone" required>



    <div class="warning-box">

        ⚠️ Flights depend on weather conditions.

    </div>



    <button type="submit">

        Confirm Booking

    </button>


</form>


</section>



<script>

function toggleMenu() {

    document.getElementById("menu").classList.toggle("active");

}

</script>


</body>

</html>
