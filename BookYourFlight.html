<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Your Flight | Georgian Paragliding Federation</title>

<link rel="stylesheet" href="css/style.css">


<style>


/* ================= BOOKING ================= */


.booking-section{

max-width:720px;

margin:auto;

padding:60px 20px;

}



.booking-title h1{

text-align:center;

color:#00c2ff;

font-size:36px;

}



.subtext{

text-align:center;

color:#ccc;

margin:15px 0 30px;

}



/* FORM */


.booking-form{


display:flex;

flex-direction:column;

gap:14px;

padding:30px;


background:rgba(255,255,255,0.08);


border-radius:16px;


border:1px solid rgba(255,255,255,0.15);


backdrop-filter:blur(12px);

}



.booking-form label{

color:#00c2ff;

font-weight:bold;

font-size:14px;

}



.booking-form input,
.booking-form select{


padding:12px;

border-radius:10px;

border:none;


background:#111827;

color:white;

}



.booking-form button{


padding:14px;


background:#00c2ff;


border:none;


border-radius:10px;


font-weight:bold;


cursor:pointer;


transition:.3s;


}



.booking-form button:hover{


background:white;


}



/* WARNING */


.warning-box{


padding:12px;


background:rgba(255,165,0,0.1);


border-left:4px solid orange;


color:#ffcc66;


border-radius:8px;


}



</style>


</head>



<body>



<header>


<div class="container">



<a href="index.html" class="logo">


<img src="images/logo.jpg">


<span>
Georgian Paragliding Federation
</span>


</a>



<div class="menu-toggle" onclick="toggleMenu()">

☰

</div>



<nav class="menu" id="menu">


<a href="index.html">Home</a>

<a href="about.html">About Us</a>

<a href="gallery.html">Gallery</a>

<a href="documents.html">Documents</a>

<a href="contact.html">Contact</a>

<a href="booking.html">Book Your Flight</a>

<a href="news.html">News</a>

<a href="dashboard.html">Dashboard</a>


</nav>


</div>


</header>




<section class="booking-section">



<div class="booking-title">


<h1>
Book Your Paragliding Adventure
</h1>


</div>



<p class="subtext">

Choose your location and we will contact you shortly.

</p>





<form class="booking-form">



<label>
Location
</label>


<select required>


<option>
Select Location
</option>


<option>
Gudauri
</option>


<option>
Ananuri
</option>


<option>
Mestia
</option>


<option>
Tbilisi Sea
</option>



</select>




<label>
Date
</label>


<input type="date" required>





<label>
Full Name
</label>


<input type="text" placeholder="Your name" required>





<label>
Email
</label>


<input type="email" placeholder="Email" required>





<label>
Phone
</label>


<input type="tel" placeholder="Phone number" required>





<div class="warning-box">


⚠️ Flights depend on weather conditions and safety approval.



</div>





<button type="submit">

Confirm Booking

</button>



</form>



</section>






<script>


function toggleMenu(){


document
.getElementById("menu")
.classList
.toggle("active");


}


</script>



</body>


</html>
