<!-- ================= BOOKING ================= -->


<section class="booking-section">



<h1 class="booking-title">

Book Your Paragliding Adventure

</h1>



<p class="subtext">

Choose your location and we will contact you shortly.

</p>





<form class="booking-form">



<label>
Location
</label>



<select required>


<option>
Select Location
</option>


<option>
Gudauri
</option>


<option>
Ananuri
</option>


<option>
Mestia
</option>



</select>





<label>
Date
</label>


<input 
type="date"
required>





<label>
Full Name
</label>


<input 
type="text"
placeholder="Your name"
required>





<label>
Email
</label>


<input
type="email"
placeholder="Email"
required>





<label>
Phone
</label>


<input
type="tel"
placeholder="Phone number"
required>







<div class="warning-box">


⚠️ Flights depend on weather conditions.


</div>







<button type="submit">

Confirm Booking

</button>



</form>



</section>
