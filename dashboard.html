<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Dashboard | Paragliding Admin</title>


<style>


body{

margin:0;
font-family:Arial;
background:#0f172a;
color:white;

}



header{

background:#111827;
padding:15px 25px;

display:flex;
justify-content:space-between;
align-items:center;

border-bottom:1px solid #1f2937;

}



header h2{

margin:0;

}



.admin-badge{

font-size:12px;
background:#22c55e;

padding:3px 8px;

border-radius:6px;

}



.btn{

padding:8px 14px;

border-radius:8px;

background:#2563eb;

color:white;

text-decoration:none;

margin-left:6px;

font-size:14px;

}



.logout{

background:#dc2626;

}




.cards{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:18px;

padding:25px;

}



.card{

background:#1f2937;

padding:25px;

border-radius:14px;

text-align:center;

}



.card h3{

color:#9ca3af;

}



.card h2{

font-size:28px;

}




.filter{

padding:0 25px 20px;

display:flex;

gap:10px;

}



input,select{

padding:10px;

background:#1f2937;

color:white;

border:none;

border-radius:8px;

}




.table-container{

padding:25px;

}



table{

width:100%;

border-collapse:collapse;

background:#111827;

}



th{

background:#2563eb;

padding:12px;

}



td{

padding:12px;

text-align:center;

border-bottom:1px solid #1f2937;

}



.NEW{

color:#facc15;

font-weight:bold;

}


.CONFIRMED{

color:#4ade80;

font-weight:bold;

}


.CANCELLED{

color:#f87171;

font-weight:bold;

}



.action-btn{

padding:6px 10px;

border-radius:6px;

text-decoration:none;

margin:2px;

}



.confirm{

background:#16a34a;
color:white;

}


.cancel{

background:#dc2626;
color:white;

}


.delete{

background:black;
color:white;

}



@media(max-width:900px){

.cards{

grid-template-columns:1fr;

}


table{

font-size:12px;

}


}



</style>


</head>



<body>




<header>


<h2>

Admin Dashboard

<span class="admin-badge">
ADMIN
</span>


</h2>



<div>

<a class="btn" href="#">
CSV
</a>


<a class="btn" href="#">
Excel
</a>


<a class="btn logout" href="login.html">
Logout
</a>


</div>


</header>







<div class="cards">


<div class="card">

<h3>Total</h3>

<h2>12</h2>

</div>


<div class="card">

<h3>New</h3>

<h2>5</h2>

</div>



<div class="card">

<h3>Confirmed</h3>

<h2>6</h2>

</div>



<div class="card">

<h3>Cancelled</h3>

<h2>1</h2>

</div>


</div>







<div class="filter">


<input placeholder="Location">


<input type="date">


<select>

<option>
All
</option>


<option>
NEW
</option>


<option>
CONFIRMED
</option>


<option>
CANCELLED
</option>


</select>



<button class="btn">
Filter
</button>


</div>








<div class="table-container">


<table>


<tr>

<th>ID</th>

<th>Location</th>

<th>Date</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Status</th>

<th>Action</th>


</tr>





<tr>


<td>1</td>

<td>Gudauri</td>

<td>2026-06-20</td>

<td>Giorgi</td>

<td>example@mail.com</td>

<td>555000000</td>


<td class="CONFIRMED">
CONFIRMED
</td>


<td>


<a class="action-btn confirm">
✔
</a>


<a class="action-btn cancel">
✖
</a>


<a class="action-btn delete">
🗑
</a>


</td>


</tr>






<tr>


<td>2</td>

<td>Manavi</td>

<td>2026-06-22</td>

<td>Anna</td>

<td>anna@mail.com</td>

<td>555111111</td>


<td class="NEW">
NEW
</td>


<td>


<a class="action-btn confirm">
✔
</a>


<a class="action-btn cancel">
✖
</a>


<a class="action-btn delete">
🗑
</a>


</td>


</tr>





</table>



</div>






</body>

</html>
