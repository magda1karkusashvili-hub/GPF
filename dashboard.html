<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Dashboard | Paragliding Admin</title>


<link rel="stylesheet" href="style.css">


</head>



<body>




<header>


<div class="container">



<a href="index.html" class="logo">


<img src="logo.jpg">


<span>

Georgian Paragliding Federation

</span>


</a>





<div>


<span class="admin-badge">

ADMIN

</span>



<a class="btn" href="index.html">

Home

</a>



<a class="btn logout" href="login.html">

Logout

</a>


</div>



</div>


</header>








<section class="dashboard-page">





<h1 class="dashboard-title">

📊 Admin Dashboard

</h1>







<div class="cards">



<div class="card glass">

<h3>

Total Bookings

</h3>


<h2 id="total">

0

</h2>


</div>








<div class="card glass">

<h3>

New

</h3>


<h2 id="new">

0

</h2>


</div>








<div class="card glass">

<h3>

Confirmed

</h3>


<h2 id="confirmed">

0

</h2>


</div>








<div class="card glass">

<h3>

Cancelled

</h3>


<h2 id="cancelled">

0

</h2>


</div>





</div>









<div class="filter glass">



<input placeholder="Location">


<input type="date">



<select>


<option>

All

</option>


<option>

NEW

</option>


<option>

CONFIRMED

</option>


<option>

CANCELLED

</option>



</select>




<button class="btn">

Filter

</button>



</div>










<div class="table-container glass">



<table>


<tr>


<th>

ID

</th>


<th>

Location

</th>


<th>

Date

</th>


<th>

Name

</th>


<th>

Email

</th>


<th>

Phone

</th>


<th>

Status

</th>


<th>

Action

</th>


</tr>





<tr>


<td colspan="8">


No bookings available


</td>


</tr>





</table>




</div>





</section>









<script>


function toggleMenu(){


document
.getElementById("menu")
.classList.toggle("active");


}



</script>






</body>

</html>
