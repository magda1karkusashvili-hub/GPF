<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Paragliding Admin</title>


<style>

body {

margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;

}


header {

background:#111827;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;

}



.admin-badge {

font-size:12px;
background:#22c55e;
padding:3px 8px;
border-radius:6px;

}



.btn {

padding:8px 14px;
border-radius:8px;
background:#2563eb;
color:white;
text-decoration:none;
margin-left:6px;

}


.logout {

background:#dc2626;

}



.cards {

display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
padding:25px;

}



.card {

background:#1f2937;
padding:25px;
border-radius:14px;
text-align:center;

}



.filter {

padding:25px;
display:flex;
gap:10px;

}



input,select {

padding:10px;
border-radius:8px;
border:none;

}



.table-container {

padding:25px;

}



table {

width:100%;
border-collapse:collapse;
background:#111827;

}



th {

background:#2563eb;
padding:12px;

}



td {

padding:12px;
text-align:center;
border-bottom:1px solid #1f2937;

}


@media(max-width:900px){

.cards{

grid-template-columns:1fr;

}

}


</style>


</head>


<body>



<header>


<h2>

Admin Dashboard

<span class="admin-badge">
ADMIN
</span>


</h2>


<div>

<a class="btn" href="index.html">

Home

</a>


<a class="btn logout" href="login.html">

Logout

</a>


</div>


</header>





<div class="cards">


<div class="card">

<h3>Total</h3>

<h2 id="total">0</h2>

</div>


<div class="card">

<h3>New</h3>

<h2 id="new">0</h2>

</div>


<div class="card">

<h3>Confirmed</h3>

<h2 id="confirmed">0</h2>

</div>


<div class="card">

<h3>Cancelled</h3>

<h2 id="cancelled">0</h2>

</div>


</div>





<div class="filter">


<input placeholder="Location">


<input type="date">


<select>

<option>All</option>

<option>NEW</option>

<option>CONFIRMED</option>

<option>CANCELLED</option>

</select>


<button class="btn">

Filter

</button>


</div>





<div class="table-container">


<table>


<tr>

<th>ID</th>

<th>Location</th>

<th>Date</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Status</th>

<th>Action</th>

</tr>



<tr>

<td colspan="8">

No bookings available

</td>


</tr>



</table>


</div>



</body>

</html>
