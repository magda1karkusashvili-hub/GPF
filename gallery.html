<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | Georgian Paragliding Federation</title>

<link rel="stylesheet" href="style.css">


<style>


.gallery-page {

    max-width:1200px;
    margin:auto;
    padding:40px 20px;
    text-align:center;

}



.gallery-page h1 {

    color:#00c2ff;
    margin-bottom:10px;

}



.typing-text {

    color:#ccc;
    margin-bottom:30px;
    min-height:40px;

}



.gallery-cards {

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;

}



.gallery-card {

    overflow:hidden;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;

}



.gallery-card img {

    width:100%;
    height:250px;
    object-fit:cover;
    display:block;
    transition:.4s;

}



.gallery-card:hover img {

    transform:scale(1.1);

}




.lightbox {

    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:9999;

}



.lightbox img {

    max-width:90%;
    max-height:90%;
    border-radius:10px;

}





header {

    background:rgba(0,0,0,0.85);
    padding:10px 0;
    position:sticky;
    top:0;
    z-index:1000;

}



.container {

    max-width:1200px;
    margin:auto;
    padding:0 15px;

    display:flex;
    justify-content:space-between;
    align-items:center;

}



.logo {

    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:white;

}



.logo img {

    width:40px;
    height:40px;
    border-radius:50%;

}



.menu {

    display:flex;
    gap:15px;

}



.menu a {

    color:white;
    text-decoration:none;

}



.menu a:hover {

    color:#00c2ff;

}



.menu-toggle {

    display:none;
    font-size:28px;
    cursor:pointer;
    color:white;

}





@media(max-width:768px){


.gallery-cards {

    grid-template-columns:1fr;

}



.menu {

    display:none;
    flex-direction:column;

    background:black;

    position:absolute;

    top:60px;

    left:0;

    width:100%;

    padding:20px;

}



.menu.active {

    display:flex;

}



.menu-toggle {

    display:block;

}


}


</style>


</head>


<body>



<header>


<div class="container">


<a href="index.html" class="logo">


<img src="logo.jpg">


<span>

Georgian Paragliding Federation

</span>


</a>



<div class="menu-toggle" onclick="toggleMenu()">

☰

</div>



<nav class="menu" id="menu">


<a href="index.html">Home</a>

<a href="about.html">About Us</a>

<a href="gallery.html">Gallery</a>

<a href="document.html">Documents</a>

<a href="contact.html">Contact</a>

<a href="BookYourFlight.html">Book Your Flight</a>

<a href="news.html">News</a>

<a href="dashboard.html">Dashboard</a>


</nav>



</div>


</header>





<section class="gallery-page">


<h1>

Gallery

</h1>



<p class="typing-text"></p>





<div class="gallery-cards">


<div class="gallery-card">
<img src="para1.jpg" onclick="openLightbox(this)">
</div>


<div class="gallery-card">
<img src="para2.jpg" onclick="openLightbox(this)">
</div>


<div class="gallery-card">
<img src="para3.jpg" onclick="openLightbox(this)">
</div>


<div class="gallery-card">
<img src="para4.jpg" onclick="openLightbox(this)">
</div>


<div class="gallery-card">
<img src="para5.jpg" onclick="openLightbox(this)">
</div>


<div class="gallery-card">
<img src="para6.jpg" onclick="openLightbox(this)">
</div>


<div class="gallery-card">
<img src="para7.jpg" onclick="openLightbox(this)">
</div>


<div class="gallery-card">
<img src="para8.jpg" onclick="openLightbox(this)">
</div>


<div class="gallery-card">
<img src="para9.jpg" onclick="openLightbox(this)">
</div>


<div class="gallery-card">
<img src="para18.jpg" onclick="openLightbox(this)">
</div>


<div class="gallery-card">
<img src="para19.jpg" onclick="openLightbox(this)">
</div>


<div class="gallery-card">
<img src="para20.jpg" onclick="openLightbox(this)">
</div>


</div>


</section>





<div id="lightbox" class="lightbox" onclick="closeLightbox()">


<img id="lightbox-img">


</div>






<script>


function toggleMenu(){

document.getElementById("menu").classList.toggle("active");

}




function openLightbox(img){


document.getElementById("lightbox").style.display="flex";


document.getElementById("lightbox-img").src=img.src;


}




function closeLightbox(){


document.getElementById("lightbox").style.display="none";


}





const text = "Moments captured during paragliding adventures across Georgia, showcasing the country's stunning mountains, valleys, and skies through unforgettable flights filled with excitement and discovery.";


let i=0;



function typeEffect(){


if(i < text.length){


document.querySelector(".typing-text").innerHTML += text.charAt(i);

i++;

setTimeout(typeEffect,40);


}


}


typeEffect();


</script>



</body>

</html>
