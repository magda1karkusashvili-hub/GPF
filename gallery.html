<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | Georgian Paragliding Federation</title>

<link rel="stylesheet" href="css/style.css">


<style>

/* ================= PAGE ================= */

.gallery-page {

    max-width:1200px;
    margin:auto;
    padding:40px 20px;
    text-align:center;

}


.gallery-page h1 {

    color:#00c2ff;
    margin-bottom:10px;

}


.typing-text {

    color:#ccc;
    margin-bottom:30px;
    min-height:40px;

}



/* ================= GRID ================= */


.gallery-cards {

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;

}



.gallery-card {

    overflow:hidden;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;

}



.gallery-card img {

    width:100%;
    height:250px;
    object-fit:cover;
    display:block;
    transition:0.4s;

}



.gallery-card:hover img {

    transform:scale(1.1);

}





/* ================= LIGHTBOX ================= */


.lightbox {

    display:none;
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.9);

    justify-content:center;
    align-items:center;

    z-index:9999;

}



.lightbox img {

    max-width:90%;
    max-height:90%;

    border-radius:10px;

}





/* ================= MOBILE ================= */


@media(max-width:768px){


.gallery-cards{

    grid-template-columns:1fr;

}


}


</style>


</head>



<body>





<!-- ================= HEADER ================= -->


<header>

<div class="container">


<a href="index.html" class="logo">


<img src="images/logo.jpg">


<span>
Georgian Paragliding Federation
</span>


</a>





<div class="menu-toggle" onclick="toggleMenu()">

☰

</div>





<nav class="menu" id="menu">


<a href="index.html">
Home
</a>


<a href="about.html">
About Us
</a>


<a href="gallery.html">
Gallery
</a>


<a href="documents.html">
Documents
</a>


<a href="contact.html">
Contact
</a>


<a href="book.html">
Book Your Flight
</a>


<a href="news.html">
News
</a>


<a href="dashboard.html">
Dashboard
</a>


</nav>


</div>

</header>







<!-- ================= GALLERY ================= -->



<section class="gallery-page">



<h1>

Gallery

</h1>



<p class="typing-text"></p>





<div class="gallery-cards">



<div class="gallery-card">

<img src="images/para1.jpg" onclick="openLightbox(this)">

</div>



<div class="gallery-card">

<img src="images/para2.jpg" onclick="openLightbox(this)">

</div>




<div class="gallery-card">

<img src="images/para3.jpg" onclick="openLightbox(this)">

</div>




<div class="gallery-card">

<img src="images/para4.jpg" onclick="openLightbox(this)">

</div>




<div class="gallery-card">

<img src="images/para5.jpg" onclick="openLightbox(this)">

</div>




<div class="gallery-card">

<img src="images/para6.jpg" onclick="openLightbox(this)">

</div>





<div class="gallery-card">

<img src="images/para18.jpg" onclick="openLightbox(this)">

</div>




<div class="gallery-card">

<img src="images/para19.jpg" onclick="openLightbox(this)">

</div>




<div class="gallery-card">

<img src="images/para20.jpg" onclick="openLightbox(this)">

</div>



</div>



</section>








<!-- ================= LIGHTBOX ================= -->


<div id="lightbox" class="lightbox" onclick="closeLightbox()">


<img id="lightbox-img">


</div>









<script src="js/script.js"></script>




<script>


const text = 
"Moments captured during paragliding adventures across Georgia, showcasing mountains, valleys and skies through unforgettable flights.";


let i = 0;


function typeEffect(){


if(i < text.length){


document.querySelector(".typing-text").innerHTML += text.charAt(i);

i++;

setTimeout(typeEffect,40);


}


}


typeEffect();




function openLightbox(img){


document.getElementById("lightbox").style.display="flex";

document.getElementById("lightbox-img").src=img.src;


}




function closeLightbox(){


document.getElementById("lightbox").style.display="none";


}


</script>



</body>

</html>
